name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: Assemble debug and release
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-35 build-tools;35.0.0"
          log-accepted-android-sdk-licenses: false

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate debug keystore for release signing
        run: |
          mkdir -p app
          keytool -genkey -v \
            -keystore app/debug.keystore.placeholder \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=NX-developer, OU=NXPanel, O=NX, L=Istanbul, ST=Istanbul, C=TR"

      - name: Make gradlew executable
        run: |
          if [ ! -f gradlew ]; then
            curl -sSL "https://services.gradle.org/distributions/gradle-8.10.2-bin.zip" -o gradle.zip
            unzip -q gradle.zip -d /tmp
            /tmp/gradle-8.10.2/bin/gradle wrapper --gradle-version 8.10.2 --no-daemon
          fi
          chmod +x gradlew

      - name: Build debug APK
        id: build_debug
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee /tmp/build_debug.log
        continue-on-error: true

      - name: Publish debug build log to summary on failure
        if: steps.build_debug.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Debug build failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 250 /tmp/build_debug.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY'
          import json, os, subprocess, urllib.request
          with open('/tmp/build_debug.log', 'r', errors='replace') as fh:
              data = fh.read()
          import re
          blocks = []
          patterns = [
              r"^e: .*?(?=\n[a-zA-Z]|\Z)",
              r"FAILURE: .*?(?=\n\n|\Z)",
              r"\* What went wrong:.*?(?=\* Try:|\Z)",
              r"Caused by: .*?(?=\n[^ \t]|\Z)",
              r"> Task .* FAILED",
          ]
          for pat in patterns:
              for match in re.finditer(pat, data, re.DOTALL):
                  blocks.append(match.group(0))
          summary = "\n\n----\n\n".join(blocks)[:55000]
          if not summary:
              summary = data[-15000:]
          token = os.environ['GH_TOKEN']
          sha = os.environ.get('GITHUB_SHA', '')
          repo = os.environ.get('GITHUB_REPOSITORY', '')
          run_id = os.environ.get('GITHUB_RUN_ID', '')
          body = f"Build failed in run {run_id}\n\n```\n{summary}\n```\n"
          payload = json.dumps({"body": body[:60000]}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/commits/{sha}/comments",
              data=payload,
              method='POST',
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
              },
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print('Posted commit comment status:', resp.status)
          except Exception as exc:
              print('Failed to post commit comment:', exc)
          PY
          exit 1

      - name: Build release APK
        id: build_release
        run: |
          set -o pipefail
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/build_release.log
        continue-on-error: true

      - name: Publish release build log to summary on failure
        if: steps.build_release.outcome == 'failure'
        run: |
          echo "## Release build failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 /tmp/build_release.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Show APK sizes
        if: always()
        run: |
          echo "=== Debug APK ==="
          ls -lh app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "no debug apk"
          echo ""
          echo "=== Release APK ==="
          ls -lh app/build/outputs/apk/release/*.apk 2>/dev/null || echo "no release apk"

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NX-Un-Apk-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NX-Un-Apk-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload mapping file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapping-release
          path: app/build/outputs/mapping/release/
          if-no-files-found: ignore
